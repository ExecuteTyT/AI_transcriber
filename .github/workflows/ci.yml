name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npx vite build

      - name: Tests
        run: npx vitest run

  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Жёсткий гейт: ловит класс инцидента 2026-05 (несколько heads / миграции
      # не накатываются на чистую БД).
      - name: DB migrations (single head + apply)
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          JWT_SECRET_KEY: ci-test-secret-key
          ENVIRONMENT: testing
        run: |
          heads=$(alembic heads | grep -c .)
          if [ "$heads" -ne 1 ]; then echo "::error::Multiple alembic heads ($heads) — добавь merge-миграцию"; alembic heads; exit 1; fi
          alembic upgrade head

      # Advisory: модель разошлась с миграциями (нет автоген-миграции).
      # continue-on-error — пока не валидировано, что нет ложных срабатываний
      # на кастомных типах (INETType/Vector). Красный шаг = сигнал, не блок.
      - name: Schema drift check (advisory)
        continue-on-error: true
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          JWT_SECRET_KEY: ci-test-secret-key
          ENVIRONMENT: testing
        run: alembic check

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-secret-key
          ENVIRONMENT: testing
        run: python -m pytest tests/ -v --tb=short
