    <!-- Theme pre-paint: применяем data-theme ДО React-бута чтобы избежать FOUC. -->

      (function () {
        try {
          var t = localStorage.getItem("dicto:theme");
          if (t !== "dark" && t !== "light") t = "dark";
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
