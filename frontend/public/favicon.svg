<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Ink background with slight gradient for depth -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141009"/>
      <stop offset="100%" stop-color="#0b0805"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Waveform bars — live-animated, acid green. Reduced-motion users see static mid-height. -->
  <g fill="#d4ff3d">
    <rect x="5"  y="12" width="2.2" height="8" rx="1.1">
      <animate attributeName="y"      values="12;8;14;12"  dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="height" values="8;16;4;8"    dur="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="9"  y="10" width="2.2" height="12" rx="1.1">
      <animate attributeName="y"      values="10;14;7;10"  dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="height" values="12;4;18;12"  dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="13" y="8"  width="2.2" height="16" rx="1.1">
      <animate attributeName="y"      values="8;13;6;8"    dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="height" values="16;6;20;16"  dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="17" y="11" width="2.2" height="10" rx="1.1">
      <animate attributeName="y"      values="11;7;13;11"  dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="height" values="10;18;6;10"  dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="21" y="9"  width="2.2" height="14" rx="1.1">
      <animate attributeName="y"      values="9;13;7;9"    dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="height" values="14;6;18;14"  dur="1.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="25" y="12" width="2.2" height="8" rx="1.1">
      <animate attributeName="y"      values="12;9;14;12"  dur="1.0s" repeatCount="indefinite"/>
      <animate attributeName="height" values="8;14;4;8"    dur="1.0s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
