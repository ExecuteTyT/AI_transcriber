resolver 127.0.0.11 valid=10s;  # Docker DNS

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name dicto.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name dicto.pro;

    ssl_certificate /etc/letsencrypt/live/dicto.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dicto.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 500M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Иммутабельные assets (с хэшем в имени): кеш навсегда.
    # Vite генерирует имена типа vendor-react-Di1_i1S4.js — можем спокойно
    # кешировать на год, файл обновляется → имя меняется.
    location ~* ^/assets/ {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Статика: favicon, robots.txt, sitemap.xml — умеренный кеш (день).
    location ~* \.(svg|ico|png|jpg|jpeg|webp|woff2?|txt|xml)$ {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /docs {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
    }

    location /redoc {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
    }

    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # HTML — не кешируем: пререндер может обновиться на каждом релизе.
        # Но ставим «must-revalidate» чтобы браузер проверял перед отдачей.
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }
}
