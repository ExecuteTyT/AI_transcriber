# Общие настройки логгирования для всех сервисов.
# Без этого json-файлы /var/lib/docker/containers/*/*-json.log растут неограниченно
# и могут забить диск за пару недель активного прода.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aivoice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-aivoice}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aivoice}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  api:
    build: ./backend
    env_file: .env
    environment:
      - ENVIRONMENT=production
      # 152-ФЗ: путь к audit-журналу. RotatingFileHandler пишет JSON-строки
      # с событиями consent/audio_deleted/account_deleted/refresh_token_*.
      - AUDIT_LOG_PATH=/var/log/dicto/audit.log
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/data/uploads
      - audit_logs:/var/log/dicto
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    logging: *default-logging

  celery:
    build: ./backend
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - AUDIT_LOG_PATH=/var/log/dicto/audit.log
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/data/uploads
      - audit_logs:/var/log/dicto
    command: celery -A app.tasks.celery_app worker --loglevel=warning --concurrency=2
    restart: unless-stopped
    logging: *default-logging

  celery-beat:
    build: ./backend
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - AUDIT_LOG_PATH=/var/log/dicto/audit.log
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - audit_logs:/var/log/dicto
    command: celery -A app.tasks.celery_app beat --loglevel=warning
    restart: unless-stopped
    logging: *default-logging

  # Self-hosted Telegram Bot API server (--local) — файлы до 2000МБ.
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    env_file: .env
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - tg-bot-api-data:/var/lib/telegram-bot-api
    restart: unless-stopped
    logging: *default-logging

  # Telegram-бот (aiogram, тот же образ что api/celery). Long-polling.
  telegram-bot:
    build: ./backend
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - AUDIT_LOG_PATH=/var/log/dicto/audit.log
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
      telegram-bot-api:
        condition: service_started
    volumes:
      - uploads:/app/data/uploads
      - audit_logs:/var/log/dicto
      - tg-bot-api-data:/var/lib/telegram-bot-api
    command: python -m app.bot.main
    restart: unless-stopped
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        BUILD_TARGET: public
    restart: unless-stopped
    logging: *default-logging

  # Admin frontend — отдельный контейнер с минимальным bundle (только /login + /admin).
  # Деплоится либо на том же VPS (nginx server_name admin.dicto.pro + IP-allowlist)
  # как промежуточный шаг, либо на отдельный VPS (рекомендованная цель).
  admin-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        BUILD_TARGET: admin
    restart: unless-stopped
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro   # basic-auth для admin.dicto.pro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    logging: *default-logging

  # Certbot для автообновления SSL
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h; done'"
    restart: unless-stopped
    logging: *default-logging

  # ─── Monitoring ───
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    logging: *default-logging

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-dicto2026}
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    logging: *default-logging

  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    logging: *default-logging

volumes:
  pgdata:
  redisdata:
  uploads:
  certbot-webroot:
  certbot-certs:
  prometheus_data:
  grafana_data:
  # 152-ФЗ: журнал учёта действий с ПДн. RotatingFileHandler 10MB×10 →
  # ~100MB истории. Volume даёт устойчивость к docker compose down/build.
  audit_logs:
  # Файлы, скачанные self-hosted Telegram Bot API server (общий с telegram-bot).
  tg-bot-api-data:
